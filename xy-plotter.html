<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plotter for ecNetSimWeb</title>
<!-- Chart.js + Zoom -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.2.0/dist/chartjs-plugin-zoom.min.js"></script>
<!-- jsPDF (reserved for future use) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
<!-- Papa Parse for CSV -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.5.2/papaparse.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2f4f8;--card:#fff;--border:#dce0e8;
  --text:#0d1522;--text-muted:#4a5a70;--primary:#4f6ef7;
  --primary-hover:#3b5de7;--danger:#e74c5e;--success:#2ecc71;
  --radius:8px;
  --font:-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  --mono:'SF Mono','Fira Code','Consolas',monospace;
}

body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;height:100vh;overflow:hidden}
.app{max-width:1400px;margin:0 auto;padding:8px 14px;height:100vh;display:flex;flex-direction:column}

/* ===== Header ===== */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.header h1{font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px}
.header-actions{display:flex;gap:8px;align-items:center}

/* ===== Main Grid ===== */
.main-grid{display:grid;grid-template-columns:340px 1fr;gap:12px;align-items:stretch;flex:1;min-height:0}
@media(max-width:900px){.main-grid{grid-template-columns:1fr}}

/* ===== Left Panel ===== */
.left-panel{min-width:0;display:flex;flex-direction:column;overflow-y:auto}
.left-panel > div{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px;margin-bottom:6px;flex-shrink:0}
#tracesCard{flex:1;display:flex;flex-direction:column;margin-bottom:0}
#tracesCard.hidden,#axisCard.hidden{display:none}
#colTagsWrap{margin-bottom:0}

/* ===== Upload Zone ===== */
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:14px 16px;text-align:center;cursor:pointer;position:relative;transition:border .2s;background:var(--card);margin-bottom:6px}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--primary);background:#f0f3ff}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-zone .icon{font-size:30px;margin-bottom:6px}
.upload-zone .text{font-size:14px;color:var(--text-muted)}
.upload-zone .text strong{color:var(--primary)}
.upload-info{font-size:14px;display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap;margin-top:8px}
.upload-info .badge{display:inline-block;padding:3px 12px;border-radius:12px;font-size:13px;font-weight:500}
.badge-ok{background:#e3f7ec;color:#1a7a42}

/* ===== Axis Labels ===== */
.axis-labels{display:flex;gap:8px;margin-bottom:6px}
.axis-labels .al{display:flex;align-items:center;gap:6px}
.axis-labels .al label{font-size:12px;color:var(--text-muted);font-weight:500;white-space:nowrap}
.axis-labels .al input{padding:5px 10px;border:1px solid var(--border);border-radius:5px;font-size:14px;outline:none;width:110px}
.axis-labels .al input:focus{border-color:var(--primary)}
.axis-range{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px;min-width:0}
.axis-range .ar{display:flex;align-items:center;gap:3px;min-width:0}
.axis-range .ar label{font-size:12px;color:var(--text-muted);font-weight:500;white-space:nowrap;width:34px;flex-shrink:0}
.axis-range .ar input{width:58%;min-width:0;padding:2px 2px;border:1px solid var(--border);border-radius:4px;font-size:12px;outline:none;box-sizing:border-box}
.axis-range .ar input:focus{border-color:var(--primary)}

/* ===== Traces ===== */
.trace-list{display:flex;flex-direction:column;gap:4px;margin-bottom:6px}
.trace-row{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px}
.trace-row-header{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.trace-row-header .trace-index{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.trace-row-header input[type=text]{flex:1;padding:5px 10px;border:1px solid var(--border);border-radius:5px;font-size:14px;outline:none}
.trace-row-header input[type=text]:focus{border-color:var(--primary)}
.trace-row-header .btn-remove{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:20px;padding:0 4px;border-radius:3px}
.trace-row-header .btn-remove:hover{color:var(--danger)}
.trace-exprs{display:flex;flex-direction:column;gap:6px}
.trace-exprs .eg{display:flex;flex-direction:column;gap:3px}
.trace-exprs .eg label{font-size:12px;color:var(--text-muted);font-weight:500;margin-left:2px}
.trace-exprs .eg .er{display:flex;gap:4px;align-items:stretch}
.trace-exprs .eg .er select{flex:0 0 100px;border:1px solid var(--border);border-radius:5px;font-size:13px;background:var(--card);cursor:pointer;padding:3px 6px}
.trace-exprs .eg .er input[type=text]{flex:1;border:1px solid var(--border);border-radius:5px;font-size:13px;font-family:var(--mono);outline:none;padding:3px 10px}
.trace-exprs .eg .er input[type=text]:focus{border-color:var(--primary)}
.trace-exprs .eg .hint{font-size:11px;color:var(--text-muted);padding:0 2px;line-height:1.3}
.trace-style{display:flex;gap:6px;align-items:center;margin-top:4px}
.trace-style .ts-wrap{margin-left:auto;display:flex;align-items:center;gap:2px;font-size:11px;color:var(--text-muted)}
.trace-style input[type=color]{width:30px;height:30px;border:1px solid var(--border);border-radius:4px;cursor:pointer;padding:1px}
.trace-style select{padding:5px 5px;border:1px solid var(--border);border-radius:4px;font-size:13px;background:var(--card);cursor:pointer}
.trace-error{color:var(--danger);font-size:12px;margin-top:4px;display:none}
.trace-error.show{display:block}
.trace-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}

/* ===== Buttons ===== */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 18px;border:1px solid transparent;border-radius:5px;font-size:14px;font-weight:500;cursor:pointer;transition:all .12s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover)}
.btn-outline{background:transparent;color:var(--text);border-color:var(--border)}
.btn-outline:hover{background:var(--bg);border-color:#bcc4d4}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#27ae60}
.btn-sm{padding:4px 12px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ===== Chart ===== */
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;display:flex;flex-direction:column;flex:1;min-height:0}
.chart-wrap canvas{width:100%;flex:1;min-height:0}
.chart-empty{padding:80px 20px;text-align:center;color:var(--text-muted);font-size:16px}
.chart-empty .icon{font-size:52px;margin-bottom:10px}
.chart-footer{display:flex;justify-content:space-between;flex-wrap:wrap;gap:2px;margin-top:4px;font-size:13px;color:var(--text-muted);flex-shrink:0}

/* ===== Data Preview (full width bottom) ===== */
.preview-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;margin:4px auto;max-width:1400px;max-height:300px;overflow:auto}
.preview-wrap{max-height:220px;overflow:auto}
.preview-wrap table{width:100%;border-collapse:collapse;font-size:14px}
.preview-wrap th{background:var(--bg);position:sticky;top:0;z-index:1;padding:5px 10px;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap;font-weight:600;font-size:13px}
.preview-wrap td{padding:4px 10px;border-bottom:1px solid var(--border);white-space:nowrap;font-family:var(--mono);font-size:13px}
.preview-wrap tr:hover td{background:#f8f9ff}
.preview-wrap .rn{color:var(--text-muted);text-align:right;width:40px;font-size:11px}
#modalTable th,#modalTable td{padding:4px 10px;text-align:left;white-space:nowrap;font-size:13px;vertical-align:middle}
#modalTable th{background:var(--bg);position:sticky;top:0;z-index:1;border-bottom:2px solid var(--border);font-weight:600}
#modalTable td{font-family:var(--mono);border-bottom:1px solid var(--border)}
#modalTable .rn{color:var(--text-muted);text-align:right;width:40px;font-size:11px}
#modalTable tr:hover td{background:#f8f9ff}

/* ===== Toast ===== */
.toast{position:fixed;top:20px;right:20px;padding:14px 24px;border-radius:8px;color:#fff;font-size:15px;z-index:999;opacity:0;transform:translateY(-10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.error{background:var(--danger)}
.toast.info{background:var(--primary)}
.toast.success{background:var(--primary)}

/* ===== Responsive ===== */
@media(max-width:900px){
  body{overflow-y:auto}
  .app{height:auto;min-height:100vh}
  .main-grid{grid-template-columns:1fr}
  .left-panel{overflow-y:visible}
}
@media(max-width:600px){
  .app{padding:4px}
  .header h1{font-size:14px}
  .header-actions{flex-wrap:wrap;width:100%;gap:4px}
  .header-actions .btn{padding:3px 7px;font-size:11px}
  #dpiSelect{flex:1;min-width:56px;font-size:10px;padding:3px 4px}
  .left-panel > div{padding:6px;margin-bottom:4px}
  .upload-zone{padding:8px;margin-bottom:4px}
  .upload-zone .icon{font-size:18px;margin-bottom:3px}
  .upload-zone .text{font-size:11px}
  .upload-info{font-size:10px;gap:3px}
  .axis-labels .al input{width:50px;font-size:11px;padding:2px 5px}
  .axis-labels .al label{font-size:10px}
  .axis-range .ar label{font-size:9px;width:20px}
  .axis-range .ar input{font-size:10px;padding:2px 2px;width:50%}
  #btnAutoScale{font-size:10px!important}
  .trace-row{padding:4px 6px}
  .trace-row-header input[type=text]{font-size:10px;padding:1px 3px}
  .trace-exprs .eg label{font-size:10px}
  .trace-exprs .eg .er select{flex:0 0 50px;font-size:10px;padding:1px 2px}
  .trace-exprs .eg .er input[type=text]{font-size:10px;padding:1px 4px;height:22px}
  .trace-exprs .eg .hint{font-size:8px}
  .trace-style{gap:2px;margin-top:3px}
  .trace-style select{font-size:10px;padding:1px 2px}
  .trace-style input[type=color]{width:20px;height:20px}
  .trace-style .ts-wrap{font-size:9px}
  .trace-style .ts-wrap input[type=number]{width:32px!important;font-size:9px!important;padding:1px 2px!important}
  .trace-actions{margin-top:2px}
  .trace-actions .btn{font-size:10px;padding:3px 7px}
  .chart-wrap{padding:3px 4px}
  #dataModal{padding:8px}
  #modalTable th,#modalTable td{font-size:10px;padding:2px 4px}
  #modalTable .rn{width:24px;font-size:9px}
}

/* ===== Fullscreen ===== */
#chartCard:fullscreen,#chartCard:-webkit-full-screen{background:var(--card);padding:20px 30px;overflow:auto}
#chartCard:fullscreen .chart-footer,#chartCard:-webkit-full-screen .chart-footer{margin-top:10px}
#chartCard:fullscreen canvas,#chartCard:-webkit-full-screen canvas{max-height:calc(100vh - 120px)}

/* ===== Focus / Expand mode ===== */

/* ===== Scrollbar ===== */
.preview-wrap::-webkit-scrollbar{width:6px;height:6px}
.preview-wrap::-webkit-scrollbar-thumb{background:#d0d5e0;border-radius:3px}
.preview-wrap::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>

<div class="app" id="app">

  <!-- Header -->
  <header class="header" style="display:grid;grid-template-columns:340px 1fr;gap:12px;align-items:center">
    <h1 id="headerTitle">📈 Plotter for ecNetSimWeb</h1>
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px">
      <div id="chartTools" style="display:none;align-items:center;gap:6px;flex-wrap:wrap;font-size:13px;color:var(--text-muted)">
        <span>🖱️ Drag · Pan · Dbl-click reset</span>
        <label style="cursor:pointer;user-select:none;display:flex;align-items:center;gap:2px"><input type="checkbox" id="toggleTooltip"> Values</label>
        <label style="cursor:pointer;user-select:none;display:flex;align-items:center;gap:2px"><input type="checkbox" id="toggleGrid" checked> Grid</label>
        <label style="cursor:pointer;user-select:none;display:flex;align-items:center;gap:2px"><input type="checkbox" id="toggleXRev" checked> X↔</label>
        <label style="cursor:pointer;user-select:none;display:flex;align-items:center;gap:2px"><input type="checkbox" id="toggleYRev"> Y↕</label>
        <button id="btnFocus" style="background:none;border:none;cursor:pointer;font-size:13px;padding:0 4px;color:var(--text-muted)" title="Expand chart">⛶</button>
      </div>
      <div class="header-actions" id="headerActions" style="flex-shrink:0">
      <button class="btn btn-outline btn-sm" id="btnData" title="View data table">📊 Data</button>
      <button class="btn btn-outline btn-sm" id="btnExportSVG" title="Export vector SVG">📐 SVG</button>
      <button class="btn btn-outline btn-sm" id="btnExport" title="Export chart as PNG">📷 PNG</button>
      <select id="dpiSelect" style="padding:4px 8px;border:1px solid var(--border);border-radius:5px;font-size:12px;background:var(--card);cursor:pointer">
        <option value="1">72 DPI</option>
        <option value="2" selected>144 DPI</option>
        <option value="3">216 DPI</option>
        <option value="4">288 DPI</option>
        <option value="6">432 DPI</option>
        <option value="8">576 DPI</option>
      </select>
      <button class="btn btn-outline btn-sm" id="btnReset">🔄 Reset</button>
    </div>
  </header>

  <!-- Main Grid: left + right -->
  <div class="main-grid">

    <!-- ===== LEFT PANEL: upload + traces ===== -->
    <div class="left-panel">

      <!-- Upload -->
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept=".csv,.tsv,.txt">
        <div class="icon">📂</div>
        <div class="text">Drop CSV here, or <strong>click to browse</strong></div>
        <div class="upload-info" id="uploadInfo" style="display:none"></div>
      </div>

      <!-- Axis labels & range -->
      <div id="axisCard" class="hidden">
        <div class="axis-labels">
          <div class="al"><label>X label</label><input type="text" id="xLabel" placeholder="X"></div>
          <div class="al"><label>Y label</label><input type="text" id="yLabel" placeholder="Y"></div>
        </div>
        <div class="axis-range">
          <div class="ar"><label>X min</label><input type="number" id="xMin" step="0.05" placeholder="auto"></div>
          <div class="ar"><label>Y min</label><input type="number" id="yMin" step="0.05" placeholder="auto"></div>
          <div class="ar"><label>X max</label><input type="number" id="xMax" step="0.05" placeholder="auto"></div>
          <div class="ar"><label>Y max</label><input type="number" id="yMax" step="0.05" placeholder="auto"></div>
        </div>
        <a id="btnAutoScale" style="cursor:pointer;color:var(--primary);text-decoration:none;font-size:12px;display:block;text-align:right;margin-top:1px">↻ Auto</a>
      </div>

      <!-- Traces -->
      <div id="tracesCard" class="hidden">
        <div class="trace-list" id="tracesContainer"></div>
        <div class="trace-actions">
          <button class="btn btn-outline btn-sm" id="btnAddTrace">＋ Add Trace</button>
          <button class="btn btn-primary btn-sm" id="btnPlot">📈 Plot</button>
        </div>
      </div>

    </div>

    <!-- ===== RIGHT PANEL: chart ===== -->
    <div class="chart-wrap" id="chartCard" style="display:none">
      <div class="chart-empty" id="chartEmpty">
        <div class="icon">📊</div>
        <div>Load a CSV, then configure traces &amp; click <strong>Plot</strong></div>
      </div>
      <canvas id="chartCanvas"></canvas>
  </div>

</div>

<!-- Data Modal -->
<div id="dataModal" style="display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.4);padding:20px">
  <div style="background:#fff;border-radius:8px;max-width:1400px;width:95vw;max-height:95vh;margin:10px auto;display:flex;flex-direction:column;box-shadow:0 4px 30px rgba(0,0,0,0.15)">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border)">
      <span style="font-weight:600;font-size:15px">📊 Data Preview</span>
      <button id="closeModal" style="background:none;border:none;font-size:20px;cursor:pointer;padding:0 6px;color:#666">✕</button>
    </div>
    <div style="flex:1;overflow:auto;padding:8px 16px;max-height:70vh">
      <table id="modalTable" style="width:100%;border-collapse:collapse;font-size:13px">
        <thead id="modalHead"></thead>
        <tbody id="modalBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
//  Toast
// ============================================================
const Toast = {
  _el: document.getElementById('toast'),
  _t: null,
  show(m, type='info'){
    clearTimeout(this._t);
    this._el.textContent = m;
    this._el.className = `toast ${type} show`;
    this._t = setTimeout(() => this._el.classList.remove('show'), 3000);
  },
  error(m){this.show(m,'error')}, info(m){this.show(m,'info')}
};

// ============================================================
//  Expression Evaluator
// ============================================================
const ExprEval = (() => {
  function tokenize(s){
    const tks=[]; let i=0;
    while(i<s.length){
      const c=s[i];
      if(/\s/.test(c)){i++;continue}
      if(/[0-9.]/.test(c)){
        let n='';
        while(i<s.length&&/[0-9.eE+-]/.test(s[i])){
          if((s[i]==='+'||s[i]==='-')&&n.length&&/[eE]/.test(n[n.length-1])) n+=s[i++];
          else if(/[0-9.eE]/.test(s[i])) n+=s[i++];
          else break;
        }
        const v=parseFloat(n);
        if(isNaN(v)) throw new Error(`Invalid number: ${n}`);
        tks.push({t:'num',v,raw:n}); continue;
      }
      if(c==='"'||c==="'"){
        const q=c; let str=''; i++;
        while(i<s.length&&s[i]!==q){if(s[i]==='\\'){i++;if(i<s.length)str+=s[i++];}else str+=s[i++];}
        if(i>=s.length) throw new Error('Missing closing quote');
        i++; tks.push({t:'id',v:str}); continue;
      }
      if(/[a-zA-Z_\u00c0-\u024f\u0400-\u04ff]/.test(c)){
        let id='';
        while(i<s.length&&/[a-zA-Z0-9_\u00c0-\u024f\u0400-\u04ff.]/.test(s[i])) id+=s[i++];
        const u=id.toUpperCase();
        if(u==='PI'){tks.push({t:'num',v:Math.PI});continue}
        if(u==='E'){tks.push({t:'num',v:Math.E});continue}
        tks.push({t:'id',v:id}); continue;
      }
      const two=s.substr(i,2);
      if(two==='**'){tks.push({t:'op',v:'**'});i+=2;continue}
      if('+-*/^()%'.includes(c)){
        if(c==='^') tks.push({t:'op',v:'**'}); else tks.push({t:c==='('||c===')'?'paren':'op',v:c}); i++; continue;
      }
      throw new Error(`Unexpected char: '${c}'`);
    }
    tks.push({t:'eof'}); return tks;
  }

  function Parser(tks){
    let p=0;
    const pk=()=>tks[p]||{t:'eof'},cn=(t)=>{const k=pk();if(t&&k.v!==t&&k.t!==t) throw new Error(`Expected '${t}', got '${k.v||k.t}'`);p++;return k};
    const expr=()=>bin(term,['+','-']),term=()=>bin(un,['*','/']);
    const bin=(sub,ops)=>{let l=sub();while(ops.includes(pk().v)){const o=cn().v,r=sub();l={t:'bin',o,l,r}}return l};
    const un=()=>{if(pk().v==='+'||pk().v==='-'){const o=cn().v,a=un();return o==='-'?{t:'un',o,a}:a}return pow()};
    const pow=()=>{let l=pri();if(pk().v==='**'){cn();l={t:'bin',o:'**',l,r:un()}}return l};
    const pri=()=>{
      const k=pk();
      if(k.t==='num'){cn();return{t:'num',v:k.v}}
      if(k.t==='id'){const n=cn().v;if(pk().v==='('){cn('(');const a=[];if(pk().v!==')'){a.push(expr());while(pk().v===','){cn(',');a.push(expr())}}cn(')');return{t:'call',n,a}}return{t:'col',n}}
      if(k.v==='('){cn('(');const n=expr();cn(')');return n}
      throw new Error(`Unexpected token: '${k.v||k.t}'`);
    };
    return {parse:()=>{const a=expr();if(pk().t!=='eof') throw new Error(`Extra input: '${pk().v||pk().t}'`);return a}};
  }

  const F={
    SQRT:Math.sqrt,ABS:Math.abs,LOG:Math.log10,LN:Math.log,
    EXP:Math.exp,SIN:Math.sin,COS:Math.cos,TAN:Math.tan,
    ASIN:Math.asin,ACOS:Math.acos,ATAN:Math.atan,
    SINH:Math.sinh,COSH:Math.cosh,TANH:Math.tanh,
    CEIL:Math.ceil,FLOOR:Math.floor,ROUND:Math.round,
    SIGN:Math.sign,MAX:Math.max,MIN:Math.min,
    POW:(a,b)=>Math.pow(a,b),POWER:(a,b)=>Math.pow(a,b),
    RAD:d=>d*Math.PI/180,DEG:r=>r*180/Math.PI,
  };

  function eval(ast,row,cm){
    switch(ast.t){
      case'num':return ast.v;
      case'col':{
        const idx=cm[ast.n];
        if(idx===void 0) throw new Error(`Unknown column: '${ast.n}'`);
        let v=row[idx];
        if(v===null||v===void 0) throw new Error(`Col '${ast.n}' row ${row._i} is empty`);
        if(typeof v==='string'){const n=parseFloat(v);if(!isNaN(n)&&isFinite(n))v=n;else throw new Error(`Col '${ast.n}' row ${row._i} not numeric: "${v}"`)}
        if(typeof v!=='number') throw new Error(`Col '${ast.n}' row ${row._i} not a number: ${v}`);
        if(!isFinite(v)) throw new Error(`Col '${ast.n}' row ${row._i} invalid: ${v}`);
        return v;
      }
      case'un':{const a=eval(ast.a,row,cm);return ast.o==='-'?-a:a}
      case'bin':{const l=eval(ast.l,row,cm),r=eval(ast.r,row,cm);switch(ast.o){case'+':return l+r;case'-':return l-r;case'*':return l*r;case'/':if(r===0)throw new Error('Division by zero');return l/r;case'**':return Math.pow(l,r);default:throw new Error(`Unknown op: ${ast.o}`)}}
      case'call':{const fn=F[ast.n.toUpperCase()];if(!fn)throw new Error(`Unknown function: ${ast.n}()`);return fn.apply(null,ast.a.map(a=>eval(a,row,cm)))}
      default:throw new Error(`Unknown AST: ${ast.t}`);
    }
  }

  function compile(expr){
    const tks=tokenize(expr),p=new Parser(tks),ast=p.parse();
    return (row,cm)=>eval(ast,row,cm);
  }

  function validate(expr){
    try{const tks=tokenize(expr),p=new Parser(tks);p.parse();return{ok:true,err:null}}catch(e){return{ok:false,err:e.message}}
  }

  return{compile,validate};
})();

const App = {
  h:[], d:[], cm:{}, fn:'', traces:[], chart:null, _nid:1, xLabel:'', yLabel:'', showTooltips:false, showGrid:true, xRev:true, yRev:false, xMin:'', xMax:'', yMin:'', yMax:'', _rangeInit:false,
  L:'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
  _cs:['#e74c5e','#4f6ef7','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#3498db','#e84393','#00b894'],
  reset(){
    if(this.chart){this.chart.destroy();this.chart=null}
    this.h=[]; this.d=[]; this.cm={}; this.fn=''; this.traces=[]; this._nid=1; this.xLabel=''; this.yLabel=''; this.showTooltips=false; this.showGrid=true; this.xRev=true; this.yRev=false; this.xMin=''; this.xMax=''; this.yMin=''; this.yMax=''; this._rangeInit=false;
  },
  addTrace(x,y){
    const idx=this.traces.length;
    const t={id:this._nid++,name:`Trace ${idx+1}`,xExpr:x||'',yExpr:y||'',color:this._cs[idx%this._cs.length],showLine:true,pointRadius:0,pointStyle:'circle',step:1,hollow:false};
    this.traces.push(t); return t;
  },
  rmTrace(id){const i=this.traces.findIndex(t=>t.id===id);if(i>=0)this.traces.splice(i,1)},
  upTrace(id,p){const t=this.traces.find(t=>t.id===id);if(t)Object.assign(t,p)}
};

// ============================================================
//  CSV Loading
// ============================================================
function loadCSV(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>{
      Papa.parse(e.target.result,{
        header:true,skipEmptyLines:true,dynamicTyping:true,
        transformHeader:h=>h.trim(),
        transform:v=>typeof v==='string'?isNaN(parseFloat(v))?v:parseFloat(v):v,
        complete:r=>{if(r.errors.length)console.warn('CSV warnings:',r.errors);res(r)},
        error:e=>rej(e)
      });
    };
    r.onerror=()=>rej(new Error('File read failed'));
    r.readAsText(file);
  });
}

function handleFile(file){
  if(!file) return;
  const ext=file.name.split('.').pop().toLowerCase();
  if(!['csv','tsv','txt'].includes(ext)){Toast.error('Please select a CSV/TSV/TXT file');return}
  loadCSV(file).then(res=>{
    const h=res.meta.fields||[],rd=res.data;
    if(!h.length||!rd.length){Toast.error('CSV is empty or malformed');return}
    const cm={}; h.forEach((n,i)=>{cm[n]=i; if(i<26&&!/^[A-Za-z]$/.test(n)) cm[App.L[i]]=i});
    const d=rd.map((row,i)=>{const a=h.map(c=>row[c]);a._i=i+1;return a});
    App.h=h; App.d=d; App.cm=cm; App.fn=file.name;

    document.getElementById('uploadInfo').style.display='flex';
    document.getElementById('uploadInfo').innerHTML=`<span class="badge badge-ok">✓ ${file.name}</span><span>${d.length} rows</span><span>${h.length} cols</span>`;

    showPreview();
    initTraces();
    showCards(true);
    // Set default axis labels from the first trace's columns
    const rawX=h.length>1?h[1]:(h[0]||'X');
    const rawY=h.length>2?h[2]:(h.length>1?h[1]:(h[0]||'Y'));
    App.xLabel=rawX; App.yLabel=rawY;
    document.getElementById('xLabel').value=rawX;
    document.getElementById('yLabel').value=rawY;
    document.getElementById('axisCard').classList.remove('hidden');
    // Reset axis range inputs for new data
    App.xMin=''; App.xMax=''; App.yMin=''; App.yMax=''; App._rangeInit=false;
    ['xMin','xMax','yMin','yMax'].forEach(id=>document.getElementById(id).value='');
    // Auto-plot
    setTimeout(()=>renderChart(), 50);
  }).catch(e=>Toast.error('CSV parse failed: '+e.message));
}

function showPreview(){
  const {h,d}=App;
  // Build table header
  let head='<tr><th class="rn">#</th>';
  h.forEach(c=>{head+=`<th>${esc(c)}</th>`});
  head+='</tr>';
  // Build table body
  let body='';
  d.forEach((row,i)=>{
    body+=`<tr><td class="rn">${i+1}</td>`;
    row.forEach((v,j)=>{const s=typeof v==='number'?v.toPrecision(6):(v??'');body+=`<td>${esc(String(s))}</td>`});
    body+='</tr>';
  });
  document.getElementById('modalHead').innerHTML=head;
  document.getElementById('modalBody').innerHTML=body;
}

function initTraces(){
  App.traces=[]; App._nid=1;
  const c=App.h, l=App.L;
  App.addTrace(c.length>1?l[1]:c.length>0?l[0]:'', c.length>2?l[2]:c.length>1?l[1]:c.length>0?l[0]:'');
  renderTraces();
}

function renderTraces(){
  const el=document.getElementById('tracesContainer');
  el.innerHTML=App.traces.map((t,i)=>renderRow(t,i)).join('');
  App.traces.forEach(t=>{
    const e=document.getElementById(`t-${t.id}`);
    // Match expression (a single letter) to dropdown
    if(/^[A-Z]$/.test(t.xExpr)) e.querySelector('.sx').value=t.xExpr;
    if(/^[A-Z]$/.test(t.yExpr)) e.querySelector('.sy').value=t.yExpr;
    e.querySelector('.tn').addEventListener('input',ev=>App.upTrace(t.id,{name:ev.target.value}));
    e.querySelector('.sx').addEventListener('change',ev=>{
      const letter=ev.target.value;
      const idx=App.L.indexOf(letter);
      const colName=idx>=0&&idx<App.h.length?App.h[idx]:letter;
      e.querySelector('.tx').value=letter; App.upTrace(t.id,{xExpr:letter}); valTrace(t.id);
      App.xLabel=colName; document.getElementById('xLabel').value=colName;
      autoPlot();
    });
    e.querySelector('.sy').addEventListener('change',ev=>{
      const letter=ev.target.value;
      const idx=App.L.indexOf(letter);
      const colName=idx>=0&&idx<App.h.length?App.h[idx]:letter;
      e.querySelector('.ty').value=letter; App.upTrace(t.id,{yExpr:letter}); valTrace(t.id);
      App.yLabel=colName; document.getElementById('yLabel').value=colName;
      autoPlot();
    });
    e.querySelector('.tx').addEventListener('input',()=>{App.upTrace(t.id,{xExpr:e.querySelector('.tx').value});valTrace(t.id);autoPlot()});
    e.querySelector('.ty').addEventListener('input',()=>{App.upTrace(t.id,{yExpr:e.querySelector('.ty').value});valTrace(t.id);autoPlot()});
    e.querySelector('.tx').addEventListener('blur',()=>{
      if(!e.querySelector('.tx').value.trim()){const l=e.querySelector('.sx').value;e.querySelector('.tx').value=l;App.upTrace(t.id,{xExpr:l});valTrace(t.id);autoPlot()}
    });
    e.querySelector('.ty').addEventListener('blur',()=>{
      if(!e.querySelector('.ty').value.trim()){const l=e.querySelector('.sy').value;e.querySelector('.ty').value=l;App.upTrace(t.id,{yExpr:l});valTrace(t.id);autoPlot()}
    });
    e.querySelector('.tc').addEventListener('input',ev=>{App.upTrace(t.id,{color:ev.target.value});autoPlot()});
    e.querySelector('.tl').addEventListener('change',ev=>{
      const v=ev.target.value;
      App.upTrace(t.id,{showLine:v==='lp'||v==='l',pointRadius:v==='l'?0:3.5});
      autoPlot();
    });
    e.querySelector('.tp').addEventListener('change',ev=>{App.upTrace(t.id,{pointStyle:ev.target.value});autoPlot()});
    e.querySelector('.th').addEventListener('change',ev=>{App.upTrace(t.id,{hollow:ev.target.checked});autoPlot()});
    e.querySelector('.ts').addEventListener('change',ev=>{const v=parseInt(ev.target.value)||1;ev.target.value=v;App.upTrace(t.id,{step:v});autoPlot()});
    e.querySelector('.ts').addEventListener('input',ev=>{const v=parseInt(ev.target.value)||1;App.upTrace(t.id,{step:v})});
    e.querySelector('.b-rm').addEventListener('click',()=>{
      if(App.traces.length<=1){Toast.info('Keep at least one trace');return}
      App.rmTrace(t.id); renderTraces();
    });
  });
}

function renderRow(t,i){
  const lp=t.showLine&&t.pointRadius>0?'selected':'', l=t.showLine&&t.pointRadius===0?'selected':'', p=!t.showLine?'selected':'';
  const colOpts=App.h.map((c,i)=>`<option value="${App.L[i]}">${App.L[i]}: ${esc(c)}</option>`).join('');
  return `<div class="trace-row" id="t-${t.id}">
    <div class="trace-row-header">
      <span class="trace-index" style="background:${t.color}">${i+1}</span>
      <input type="text" class="tn" value="${esc(t.name)}" placeholder="Trace name">
      <button class="b-rm" title="Remove">✕</button>
    </div>
    <div class="trace-exprs">
      <div class="eg"><label>X</label><div class="er"><select class="sx">${colOpts}</select><div><div class="hint">expression (e.g. B*2+1)</div><input type="text" class="tx" value="${esc(t.xExpr)}"></div></div></div>
      <div class="eg"><label>Y</label><div class="er"><select class="sy">${colOpts}</select><div><div class="hint">expression (e.g. log(C))</div><input type="text" class="ty" value="${esc(t.yExpr)}"></div></div></div>
    </div>
    <div class="trace-style">
      <input type="color" class="tc" value="${t.color}" title="Color">
      <select class="tl" title="Plot style">
        <option value="l" ${l}>Line only</option>
        <option value="lp" ${lp}>Line+Points</option>
        <option value="p" ${p}>Points only</option>
      </select>
      <select class="tp" title="Point style">
        <option value="circle" ${t.pointStyle==='circle'?'selected':''}>●</option>
        <option value="triangle" ${t.pointStyle==='triangle'?'selected':''}>▲</option>
        <option value="rect" ${t.pointStyle==='rect'?'selected':''}>■</option>
      </select>
      <label title="Hollow points" style="cursor:pointer;font-size:13px;display:flex;align-items:center;gap:2px;white-space:nowrap">
        <input type="checkbox" class="th" ${t.hollow?'checked':''}>○
      </label>
      <span class="ts-wrap">step <input type="number" class="ts" value="${t.step}" min="1" max="999" style="width:50px;padding:3px 4px;border:1px solid var(--border);border-radius:4px;font-size:12px;text-align:center"></span>
    </div>
    <div class="trace-error" id="err-${t.id}"></div>
  </div>`;
}

function valTrace(id){
  const t=App.traces.find(x=>x.id===id); if(!t)return;
  const e=document.getElementById(`err-${id}`), errs=[];
  if(t.xExpr.trim()){const v=ExprEval.validate(t.xExpr);if(!v.ok)errs.push(`X: ${v.err}`)}
  if(t.yExpr.trim()){const v=ExprEval.validate(t.yExpr);if(!v.ok)errs.push(`Y: ${v.err}`)}
  e.textContent=errs.length?'⚠️ '+errs.join('; '):''; e.classList.toggle('show',errs.length>0);
}

// ============================================================
//  Chart Rendering
// ============================================================
function renderChart(silent){
  if(!App.traces.length){if(!silent)Toast.info('Add at least one trace');return}
  for(const t of App.traces){if(!t.xExpr.trim()||!t.yExpr.trim()){if(!silent)Toast.error(`"${t.name}" — X/Y expression required`);return}}

  const {d:h,cm}=App,datasets=[]; let hasData=false,hasErr=false;

  for(const trace of App.traces){
    let xc,yc;
    try{xc=ExprEval.compile(trace.xExpr);yc=ExprEval.compile(trace.yExpr)}catch(e){if(!silent)Toast.error(`"${trace.name}" expr error: ${e.message}`);hasErr=true;continue}
    const pts=[]; let ok=false,fE=null,nE=0,s=0;
    for(const row of h){
      try{const x=xc(row,cm),y=yc(row,cm);if(x!==null&&y!==null&&isFinite(x)&&isFinite(y)){if(s%trace.step===0)pts.push({x,y});s++;ok=true}}catch(e){if(nE===0)fE=e.message;nE++}
    }
    if(!ok){let d=`"${trace.name}" — all points invalid`;if(fE)d+=` (first: ${fE})`;console.warn('[XY-Plotter]',d);if(!silent)Toast.error(d);hasErr=true;continue}
    hasData=true;
    datasets.push({
      label:trace.name,data:pts,
      backgroundColor:trace.hollow?'transparent':trace.color+'80',borderColor:trace.color,borderWidth:trace.showLine?1.5:0,
      pointBackgroundColor:trace.hollow?'transparent':trace.color,pointBorderColor:trace.color,pointBorderWidth:trace.hollow?2:0,pointRadius:trace.pointRadius,
      pointHoverRadius:trace.pointRadius>0?6:0,pointStyle:trace.pointStyle,
      showLine:trace.showLine,tension:0.1,fill:false,
    });
  }
  if(hasErr) return;
  if(!hasData){if(!silent)Toast.error('All data points invalid — check expressions');return}

  document.getElementById('chartCard').style.display='block';
  document.getElementById('chartEmpty').style.display='none';
  document.getElementById('chartTools').style.display='flex';
  const canvas=document.getElementById('chartCanvas'),ctx=canvas.getContext('2d');
  if(App.chart){App.chart.destroy();App.chart=null}

  let allX=[],allY=[];
  datasets.forEach(ds=>ds.data.forEach(p=>{allX.push(p.x);allY.push(p.y)}));
  const nr=a=>{if(!a.length)return{min:-1,max:1};let mn=Math.min(...a),mx=Math.max(...a),r=mx-mn;if(r===0){mn-=1;mx+=1}else{const pad=r*0.05;mn-=pad;mx+=pad}return{min:mn,max:mx}};
  const xR=nr(allX),yR=nr(allY);
  // Apply user-defined axis range if set
  const xMin=App.xMin!==''?parseFloat(App.xMin):undefined,xMax=App.xMax!==''?parseFloat(App.xMax):undefined;
  const yMin=App.yMin!==''?parseFloat(App.yMin):undefined,yMax=App.yMax!==''?parseFloat(App.yMax):undefined;

  Chart.register('zoom',ChartZoom);
  App.chart=new Chart(ctx,{
    type:'scatter',data:{datasets},
    options:{
      responsive:true,maintainAspectRatio:false,animation:{duration:300},
      interaction:{mode:'nearest',intersect:false},
      plugins:{
        legend:{position:'top',labels:{usePointStyle:true,boxWidth:8,boxHeight:8,padding:4,font:{size:13}},title:{display:false}},
        tooltip:{enabled:App.showTooltips,backgroundColor:'rgba(0,0,0,0.4)',cornerRadius:4,padding:10,titleFont:{size:14},bodyFont:{size:14},callbacks:{label:ctx=>{const p=ctx.parsed;return` ${ctx.dataset.label}: (${p.x.toPrecision(5)}, ${p.y.toPrecision(5)})`}}},
        zoom:{zoom:{wheel:{enabled:false},pinch:{enabled:true},drag:{enabled:true,backgroundColor:'rgba(79,110,247,0.08)',borderColor:'#4f6ef7',borderWidth:1},mode:'xy'},pan:{enabled:true,mode:'xy'},limits:{x:{min:'original',max:'original'},y:{min:'original',max:'original'}}}
      },
      scales:{
        x:{type:'linear',reverse:App.xRev,position:'bottom',title:{display:true,text:App.xLabel||'X',color:'#000',font:{size:16,weight:'600'}},ticks:{color:'#000',font:{size:12}},grid:{color:App.showGrid?'rgba(0,0,0,0.12)':'transparent',display:App.showGrid},border:{color:'#000',width:1.5},suggestedMin:xR.min,suggestedMax:xR.max,min:xMin,max:xMax},
        xTop:{type:'linear',reverse:App.xRev,position:'top',grid:{display:false},border:{color:'#000',width:1.5},ticks:{display:false},title:{display:false}},
        y:{type:'linear',reverse:App.yRev,position:'left',title:{display:true,text:App.yLabel||'Y',color:'#000',font:{size:16,weight:'600'}},ticks:{color:'#000',font:{size:12}},grid:{color:App.showGrid?'rgba(0,0,0,0.12)':'transparent',display:App.showGrid},border:{color:'#000',width:1.5},suggestedMin:yR.min,suggestedMax:yR.max,min:yMin,max:yMax},
        yRight:{type:'linear',reverse:App.yRev,position:'right',grid:{display:false},border:{color:'#000',width:1.5},ticks:{display:false},title:{display:false}}
      }
    }
  });
  // Fill auto range values after chart renders
  if(!App._rangeInit) setTimeout(()=>{
    App._rangeInit=true;
    const xs=App.chart?.scales?.x, ys=App.chart?.scales?.y;
    if(xs&&ys){
      document.getElementById('xMin').value=xs.min.toPrecision(4);
      document.getElementById('xMax').value=xs.max.toPrecision(4);
      document.getElementById('yMin').value=ys.min.toPrecision(4);
      document.getElementById('yMax').value=ys.max.toPrecision(4);
    }
  },100);
  // Toggle init
  document.getElementById('toggleTooltip').checked=App.showTooltips;
  document.getElementById('toggleGrid').checked=App.showGrid;
  document.getElementById('toggleXRev').checked=App.xRev;
  document.getElementById('toggleYRev').checked=App.yRev;
}

// Axis range handlers
['xMin','xMax','yMin','yMax'].forEach(id=>{
  const el=document.getElementById(id);
  el.addEventListener('input',()=>{
    App[id]=el.value;
    if(App.chart) renderChart(true);
  });
  // On focus, if empty, fill from current chart scale
  el.addEventListener('focus',()=>{
    if(el.value.trim()===''&&App.chart){
      const axis=id[0], bound=id.endsWith('Min')?'min':'max';
      const v=App.chart.scales[axis][bound];
      if(v!=null){el.value=v.toPrecision(4);el.dispatchEvent(new Event('input'))}
    }
  });
  // Wheel: start from current chart scale
  el.addEventListener('wheel',e=>{
    e.preventDefault();
    const step=parseFloat(el.step)||0.05;
    let cur=parseFloat(el.value);
    if(isNaN(cur)){
      const axis=id[0], bound=id.endsWith('Min')?'min':'max';
      cur=App.chart?.scales?.[axis]?.[bound];
      if(cur==null) cur=0;
    }
    el.value=(cur+(e.deltaY<0?step:-step)).toPrecision(4);
    el.dispatchEvent(new Event('input'));
  },{passive:false});
});

// --- Export SVG (true vector) ---
document.getElementById('btnExportSVG').addEventListener('click',()=>{
  if(!App.chart||!App.chart.data.datasets.length){Toast.error('Plot first');return}
  try{
    const ds=App.chart.data.datasets;
    const w=600,h=400,pad=55,plotW=w-2*pad,plotH=h-2*pad;
    let allX=[],allY=[];
    ds.forEach(d=>d.data.forEach(p=>{allX.push(p.x);allY.push(p.y)}));
    const nr=a=>{if(!a.length)return{min:-1,max:1};let mn=Math.min(...a),mx=Math.max(...a),r=mx-mn;if(r===0){mn-=1;mx+=1}else{const pa=r*0.05;mn-=pa;mx+=pa}return{min:mn,max:mx}};
    const xR=nr(allX),yR=nr(allY);
    const sx=v=>(v-xR.min)/(xR.max-xR.min)*plotW+pad;
    const sy=v=>(1-(v-yR.min)/(yR.max-yR.min))*plotH+pad;
    const ticks=5;
    let xL='',yL='',grid='';
    for(let i=0;i<=ticks;i++){const v=xR.min+(xR.max-xR.min)*i/ticks,x=sx(v);xL+=`<text x="${x}" y="${h-pad+16}" text-anchor="middle" font-size="11" fill="#555">${v.toPrecision(4)}</text>`;grid+=`<line x1="${x}" y1="${pad}" x2="${x}" y2="${h-pad}" stroke="#eee" stroke-width="1"/>`}
    for(let i=0;i<=ticks;i++){const v=yR.min+(yR.max-yR.min)*i/ticks,y=sy(v);yL+=`<text x="${pad-8}" y="${y+4}" text-anchor="end" font-size="11" fill="#555">${v.toPrecision(4)}</text>`;grid+=`<line x1="${pad}" y1="${y}" x2="${w-pad}" y2="${y}" stroke="#eee" stroke-width="1"/>`}
    const axes=`<line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="#333" stroke-width="1.5"/><line x1="${pad}" y1="${pad}" x2="${pad}" y2="${h-pad}" stroke="#333" stroke-width="1.5"/><text x="${w/2}" y="${h-4}" text-anchor="middle" font-size="13" font-weight="600">${esc(App.xLabel||'X')}</text><text x="${14}" y="${h/2+4}" text-anchor="middle" font-size="13" font-weight="600" transform="rotate(-90,14,${h/2})">${esc(App.yLabel||'Y')}</text>`;
    let traces='',leg='',legY=pad+2;
    ds.forEach((d,idx)=>{
      if(!d.data.length) return;
      const pts=d.data.map(p=>`${sx(p.x)},${sy(p.y)}`).join(' ');
      const c=d.borderColor||'#4f6ef7';
      traces+=`<polyline points="${pts}" fill="none" stroke="${c}" stroke-width="1.5" stroke-linejoin="round"/>${d.data.map(p=>`<circle cx="${sx(p.x)}" cy="${sy(p.y)}" r="${d.pointRadius>0?2.5:0}" fill="${c}"/>`).join('')}`;
      leg+=`<line x1="${w-pad+8}" y1="${legY+4}" x2="${w-pad+28}" y2="${legY+4}" stroke="${c}" stroke-width="2"/><text x="${w-pad+32}" y="${legY+7}" font-size="10" fill="#333">${esc(d.label)}</text>`;legY+=16;
    });
    const svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}"><rect width="${w}" height="${h}" fill="#fff"/>${grid}${axes}${xL}${yL}${traces}${leg}</svg>`;
    const a=document.createElement('a');
    a.download=(App.fn?App.fn.replace(/\.[^.]+$/,''):'plot')+'.svg';
    a.href='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
    a.click();
  }catch(e){Toast.error('SVG export failed: '+e.message)}
});

// --- Focus mode toggle (one button) ---
let focusState=null;
document.getElementById('btnFocus').addEventListener('click',()=>{
  if(focusState){exitFocus();return}
  const chart=document.getElementById('chartCard');
  if(chart.style.display==='none'||!App.chart){Toast.error('Plot first');return}
  // Save states
  focusState={};
  ['headerTitle','headerActions','input-area','axisCard','tracesCard'].forEach(id=>{
    const el=document.getElementById(id)||document.querySelector('.'+id);
    if(el){focusState[id]={disp:el.style.display||'',el}}
  });
  // Hide them
  Object.values(focusState).forEach(s=>{if(s.el)s.el.style.display='none'});
  // Save app/grid styles
  focusState._app={el:document.getElementById('app'),mw:document.getElementById('app').style.maxWidth,pd:document.getElementById('app').style.padding};
  document.getElementById('app').style.maxWidth='none'; document.getElementById('app').style.padding='0';
  focusState._grid={el:document.querySelector('.main-grid'),mw:document.querySelector('.main-grid').style.maxWidth};
  document.querySelector('.main-grid').style.maxWidth='none';
  // Chart as fullscreen flex container
  chart.style.position='fixed'; chart.style.inset='0'; chart.style.zIndex='1000';
  chart.style.background='var(--card)'; chart.style.border='none'; chart.style.borderRadius='0';
  chart.style.padding='0'; chart.style.display='flex'; chart.style.flexDirection='column';
  // Make canvas fill all space between header and footer
  const canvas=document.getElementById('chartCanvas');
  canvas.style.flex='1'; canvas.style.width='100%'; canvas.style.minHeight='0';
  if(App.chart){App.chart.options.maintainAspectRatio=false;App.chart.resize()}
  // Bring chartTools as a draggable floating bar
  const tools=document.getElementById('chartTools');
  focusState._toolsDisp=tools.style.display;
  focusState._toolsCS=tools.style.cssText;
  tools.style.cssText=''; // reset then apply
  tools.style.display='flex'; tools.style.fontSize='12px'; tools.style.gap='10px'; tools.style.position='fixed';
  tools.style.top='10px'; tools.style.right='60px';
  tools.style.zIndex='1001'; tools.style.background='var(--card)';
  tools.style.padding='4px 16px'; tools.style.border='1px solid var(--border)';
  tools.style.borderRadius='8px'; tools.style.boxShadow='0 2px 12px rgba(0,0,0,0.12)';
  tools.style.cursor='grab'; tools.style.userSelect='none';
  // Drag support
  let dx=0,dy=0, dragging=false;
  tools.addEventListener('mousedown',e=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='BUTTON'||e.target.tagName==='LABEL') return;
    dragging=true; const r=tools.getBoundingClientRect();
    dx=e.clientX-r.left; dy=e.clientY-r.top;
    tools.style.cursor='grabbing';
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging) return;
    tools.style.left=(e.clientX-dx)+'px'; tools.style.top=(e.clientY-dy)+'px';
    tools.style.right='auto'; tools.style.transform='none';
  });
  document.addEventListener('mouseup',()=>{
    if(!dragging) return;
    dragging=false; tools.style.cursor='grab';
  });
  // Save for exit
  focusState._chart=chart;
  focusState._asp=App.chart?.options?.maintainAspectRatio;
  document.getElementById('btnFocus').textContent='✕';
  document.getElementById('btnFocus').title='Exit focus';
});
function exitFocus(){
  if(!focusState) return;
  Object.keys(focusState).forEach(k=>{
    if(k.startsWith('_')) return;
    const s=focusState[k]; if(s&&s.el) s.el.style.display=s.disp;
  });
  focusState._app.el.style.maxWidth=focusState._app.mw;
  focusState._app.el.style.padding=focusState._app.pd;
  focusState._grid.el.style.maxWidth=focusState._grid.mw;
  focusState._chart.style.cssText='';
  document.getElementById('chartCanvas').style.cssText='';
  // Restore chartTools
  const t=document.getElementById('chartTools');
  t.style.cssText=focusState._toolsCS||'';
  t.style.display=focusState._toolsDisp||'none';
  renderChart(true);
  document.getElementById('btnFocus').textContent='⛶';
  document.getElementById('btnFocus').title='Expand chart';
  focusState=null;
}

function esc(s){return typeof s!=='string'?String(s):s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
